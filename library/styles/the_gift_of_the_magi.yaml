  notes: The story follows a classic three-act structure. Act One establishes the
    setting (poverty), the characters (Della and Jim), and the inciting incident (the
    need for Christmas money). Act Two is the rising action where Della sells her
    hair to buy a gift for Jim, followed by the climax when Jim returns home and reacts
    to her short hair. Act Three provides the resolution/twist, revealing that Jim
    sold his watch to buy combs for Della's hair, leading to the thematic conclusion
    about the wisdom of their mutual sacrifice.
