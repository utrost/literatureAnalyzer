  notes: 'The story follows a clear three-act structure. Act One establishes the status
    quo (Mara tending the light) and introduces the inciting incident (the storm destroys
    the lens). Act Two presents the rising action and conflict, where Mara faces the
    despair of the council''s decision to abandon the lighthouse, leading to a ''dark
    night of the soul'' moment of failure. The climax occurs when she discovers the
    grandfather''s spare lens and undertakes the arduous task of repairing it. Act
    Three provides the resolution: the light is restored, the community celebrates,
    and the status quo is reaffirmed with a deeper sense of continuity.'
