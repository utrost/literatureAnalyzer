exemplars:
- Mara kept the lighthouse the way her father had kept it, and his father before him.
  Every evening she climbed the ninety-seven steps, trimmed the wick, and set the
  great lamp burning. The fishing boats knew her light. The town below slept easy
  because it turned, steady and warm, through every dark hour. She loved the work.
  She loved the quiet. She wanted nothing more than for the light to go on turning
  after she was gone.
- That evening the light turned again. Mara stood in the gallery and watched the beam
  sweep out across the water, steady and warm, and the boats in the harbor blew their
  horns one after another until the whole bay was singing. The council came the next
  week and saw the light and quietly forgot about the headland. Mara climbed the steps
  that night the way she always had, and the town below slept easy, and the light
  went on turning.
