  notes: The story follows a classic three-act structure. Act I (Setup) introduces
    the White family, their isolated home, and the introduction of the cursed Monkey's
    Paw by Sergeant-Major Morris, establishing the central conflict and the rules
    of the magic. Act II (Confrontation) sees the first wish granted in a tragic manner
    through the death of Herbert, which shifts the tone from skepticism to horror
    and grief, setting up the final conflict. Act III (Resolution) involves Mrs. White's
    desperate second wish for her son's return and Mr. White's frantic third wish
    to undo it, resolving the tension with a chilling ambiguity as the entity is sent
    away.
