# Config for the LLM-powered --deep passes only. The deterministic core
# (arc + style) needs no config and no model. Copy to config.yaml and point
# these at a pulled Ollama model (or a cloud provider via LiteLLM).
#
# provider: ollama is auto-normalized to ollama_chat (same fix as Endless —
# /api/generate skips chat templates).
#
# Cloud / hosted models (no GPU, faster): set a role's provider to openrouter,
# openai, or anthropic and put the key in .env (OPENROUTER_API_KEY etc. — see
# .env.example; loaded automatically on --deep). Structured extraction uses JSON
# mode for Ollama/OpenRouter and tool-calls for OpenAI/Anthropic; override with
# `json_mode: true|false`. Example role:
#   lector:
#     provider: openrouter
#     model: anthropic/claude-3.5-sonnet
#     max_tokens: 4000
#     # api_key_env: OPENROUTER_API_KEY   # only for a non-standard var name

deep:
  lector:
    provider: ollama
    model: qwen2.5:14b
    endpoint: http://localhost:11434
    temperature: 0.2
    max_tokens: 4000
    thinking: false
  beat_labeler:
    provider: ollama
    model: qwen2.5:14b
    endpoint: http://localhost:11434
    temperature: 0.2
    max_tokens: 4000
    thinking: false
  classifier:
    provider: ollama
    model: qwen2.5:14b
    endpoint: http://localhost:11434
    temperature: 0.2
    max_tokens: 2000
    thinking: false
